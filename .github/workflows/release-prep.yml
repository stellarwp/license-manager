# This workflow prepares a release by bumping the version and writing the changelog.
---
name: Release Prep

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git Commit Ref (branch, tag, or hash). Defaults to the chosen workflow branch if not provided."
        default: ""
        required: false
        type: string
      version:
        description: "Version to write (e.g., 1.0.0)"
        required: true
        type: string
      date:
        description: "Release date (YYYY-MM-DD)"
        required: false
        type: string
        default: "today"

jobs:
  set_vars:
    runs-on: ubuntu-latest

    outputs:
      ref: ${{ steps.set_var.outputs.ref }}
      version: ${{ steps.set_var.outputs.version }}
      date: ${{ steps.set_var.outputs.date }}

    steps:
      - name: Prepare job variables
        run: |
          # Use the ref input or default to ref where the workflow file is ran from.
          if [ -n "${{ github.event.inputs.ref }}" ]; then
            echo "JOB_REF=${{ github.event.inputs.ref }}" >> $GITHUB_ENV
          else
            echo "JOB_REF=${{ github.ref }}" >> $GITHUB_ENV
          fi

          echo "JOB_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

          # Default to today's date if no date is provided
          if [ -z "${{ github.event.inputs.date }}" ] || [ "${{ github.event.inputs.date }}" = "today" ]; then
            echo "JOB_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          else
            echo "JOB_DATE=${{ github.event.inputs.date }}" >> $GITHUB_ENV
          fi

      - name: Set ref github workflow output
        id: set_var
        run: |
          echo "ref=${{ env.JOB_REF }}" >> $GITHUB_OUTPUT
          echo "version=${{ env.JOB_VERSION }}" >> $GITHUB_OUTPUT
          echo "date=${{ env.JOB_DATE }}" >> $GITHUB_OUTPUT

  release-prep:
    runs-on: ubuntu-latest

    needs: set_vars

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.set_vars.outputs.ref }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run release prep
        run: |
          dev_scripts/release-prep.sh "${{ needs.set_vars.outputs.version }}" "${{ needs.set_vars.outputs.date }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Bumped version to v${{ needs.set_vars.outputs.version }} and wrote changelog entries."
          title: "Release Prep v${{ needs.set_vars.outputs.version }}"
          body: |
            Bumps the version and writes changelog entries for v${{ needs.set_vars.outputs.version }}

            Release Date: ${{ needs.set_vars.outputs.date }}
          branch: release-prep-${{ needs.set_vars.outputs.version }}
          base: ${{ needs.set_vars.outputs.ref }}
          delete-branch: true
          labels: |
            Code Review
            No QA Needed
          token: ${{ secrets.GITHUB_TOKEN }}
